career-profile:
    title: Career Profile
    summary: |
      Motivated software developer with a strong academic background from FER, Croatia,
      and hands-on experience in delivering real-world solutions. During university,
      pursued specialized coursework to strengthen expertise in software development and
      build a solid technical foundation. Started a professional career as a student and
      has continued to develop skills through practical experience after graduation. 
      Brings a strong ability to apply theoretical knowledge to complex projects, with a
      focus on technology, innovation, and delivering reliable, high-quality software solutions.
      In free time, enjoys working on personal and DIY projects, further exploring new technologies
      and practical problem-solving.
education:
    title: Education
    info:
      - degree: MSc in Computer Engineering, univ. mag. ing. comp.
        university: Faculty of Electrical Engineering and Computing (FER), University of Zagreb
        time: 2018 - 2023
        details: |
          Completed coursework that strengthened expertise in software development, with a focus on
          Object-Oriented Programming, Android Application Development, Expert Java course (led by Marko Čupić),
          Web and Mobile Software Development, and Artificial Intelligence.
      - degree: Gymnasium
        university: High school Ivanec
        time: 2014 - 2018
        details: |
          Participated in several inter-county competitions, festivals, and summer camps in STEM-related fields,
          including a national mathematics competition. Further developed mathematical knowledge through weekly
          advanced classes at the Center of Excellence in Varaždin.
experiences:
    title: Experiences
    info:
      - role: Full Stack Developer
        time: Oct, 2021 - Present
        company: True North
        details: |
            Full Stack Developer with expertise in Go, Java, and React, working on projects in various industries,
            including banking and public sector solutions. Combines technical development with a consultative approach,
            helping define requirements and deliver effective software solutions.
        projects:
        - name: RBA.hr
          time: Oct, 2023 - Present
          details: |
            Full Stack Developer in the Card Issuing team, working on the development and maintenance of a new card platform
            within the RBA Croatia group. Contributes to the implementation of new features, platform migration activities,
            daily incident handling, production support, and ongoing system improvements. Involved in ensuring platform stability,
            supporting business-critical processes, and delivering reliable solutions in a complex banking environment.        
        - name: HZMO
          time: Dec, 2022 - Feb, 2023
          details: |
            Worked on the development of an application for HZMO used to calculate a user’s share of the family pension.
            Contributed as the sole frontend developer, responsible for implementing the frontend and gaining valuable insight
            into the business processes behind the application.
        - name: AKD Squid2
          time: Oct, 2021 - Oct, 2023
          details: |
            Worked on a complex project based on microservices architecture for card issuing and production management.
            Contributed to both backend and frontend development, participating in the implementation of new features,
            aintenance of existing functionalities, and continuous improvement of the system. Collaborated within a team
            on a large-scale solution, following best development practices and gaining experience in designing and building
            reliable, scalable software in a demanding domain.
